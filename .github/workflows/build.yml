name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - name: Restore signing files
        env:
          WBOOKS_KEYSTORE_BASE64: ${{ secrets.WBOOKS_KEYSTORE_BASE64 }}
          WBOOKS_SIGNING_PROPERTIES_BASE64: ${{ secrets.WBOOKS_SIGNING_PROPERTIES_BASE64 }}
        run: |
          test -n "$WBOOKS_KEYSTORE_BASE64"
          test -n "$WBOOKS_SIGNING_PROPERTIES_BASE64"
          mkdir -p ../.secrets
          printf '%s' "$WBOOKS_KEYSTORE_BASE64" | base64 --decode > ../.secrets/wBooks.jks
          printf '%s' "$WBOOKS_SIGNING_PROPERTIES_BASE64" | base64 --decode > ../.secrets/wBooks-signing.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant gradlew execute permission
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore

      - name: Assemble debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload debug APK (watch)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload debug APK (companion)
        uses: actions/upload-artifact@v4
        with:
          name: companion-debug
          path: companion/build/outputs/apk/debug/companion-debug.apk
          if-no-files-found: error
